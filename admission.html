  <!-- Resource Hints & Preconnect -->
  <link rel="preconnect" href="https://fonts.googleapis.com">
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
  <link rel="dns-prefetch" href="https://fonts.googleapis.com">

  <!-- Preload Critical Assets -->
  <link rel="preload" href="css/style.css" as="style">
  <link rel="preload" href="Gallery/Logo.png" as="image" fetchpriority="high">
  <link rel="preload" href="includes/header.html" as="fetch" crossorigin>
  <link rel="preload" href="includes/footer.html" as="fetch" crossorigin>

  <link rel="stylesheet" href="css/style.css">
</head>
<body>


  <div id="site-header"></div>


  <section class="section section-bg">
    <div class="container text-center animate-fade-up">
      <h1 class="section-title mb-2">Online Admission</h1>
      <p class="mb-4">Fill out the form below to secure your place. We will contact you back via WhatsApp.</p>
      
      <div style="max-width: 600px; margin: 0 auto; background-color: var(--surface-color); padding: 3rem 2rem; border-radius: var(--radius-lg); box-shadow: var(--shadow-md); border: 1px solid var(--border-color); text-align: left;">
        
        <!-- Netlify Form -->
        <form name="admission" method="POST" data-netlify="true" action="success.html">
          <div class="form-group">
            <label class="form-label" for="fullname">Full Name <span style="color: red;">*</span></label>
            <input type="text" id="fullname" name="fullname" class="form-control" required placeholder="Enter your full name">
          </div>
          
          <div class="form-group">
            <label class="form-label" for="phone">Phone / WhatsApp Number <span style="color: red;">*</span></label>
            <input type="tel" id="phone" name="phone" class="form-control" required placeholder="03XXXXXXXXX">
          </div>
          
          <div class="form-group">
            <label class="form-label" for="email">Email Address <span style="color: var(--text-muted); font-weight: normal;">(Optional)</span></label>
            <input type="email" id="email" name="email" class="form-control" placeholder="you@example.com">
          </div>
          
          <div class="form-group">
            <label class="form-label" for="course">Course Selection <span style="color: red;">*</span></label>
            <select id="course" name="course" class="form-control" required>
              <option value="" disabled selected>Select a course</option>
              <optgroup label="Professional Programs">
                <option value="Digital Marketing">Digital Marketing</option>
                <option value="Web Development">Web Development</option>
                <option value="Freelancing">Freelancing</option>
                <option value="Computer Programming">Computer Programming</option>
                <option value="AutoCAD">AutoCAD</option>
                <option value="Shorthand">Shorthand</option>
              </optgroup>
              <optgroup label="Language Programs">
                <option value="English Spoken">English Spoken</option>
                <option value="IELTS">IELTS</option>
              </optgroup>
              <optgroup label="Graphic Designing & Video Editing">
                <option value="Graphic Design / Illustrator / Photoshop">Graphic Design (Ai, Ps)</option>
                <option value="Video Editing">Video Editing (Pr, Ae)</option>
              </optgroup>
              <optgroup label="NVC Certifications">
                <option value="NVC Level II">NVC Level II – Office Management</option>
                <option value="NVC Level III">NVC Level III – Computer Operator / IT Assistant</option>
              </optgroup>
              <optgroup label="Special Preparation">
                <option value="9th Class Computer">9th Class Computer</option>
                <option value="10th Class Computer">10th Class Computer</option>
                <option value="1st Year Computer">1st Year Computer</option>
                <option value="2nd Year Computer">2nd Year Computer</option>
              </optgroup>
            </select>
          </div>
          
          <div class="form-group">
            <label class="form-label" for="education">Education Level <span style="color: red;">*</span></label>
            <select id="education" name="education" class="form-control" required>
              <option value="" disabled selected>Select education level</option>
              <option value="Matric">Matric</option>
              <option value="Intermediate">Intermediate (FSc/FA/ICS)</option>
              <option value="Bachelors">Bachelors</option>
              <option value="Masters">Masters</option>
              <option value="Other">Other</option>
            </select>
          </div>
          
          <div class="form-group">
            <label class="form-label" for="message">Message / Notes <span style="color: var(--text-muted); font-weight: normal;">(Optional)</span></label>
            <textarea id="message" name="message" class="form-control" rows="4" placeholder="Any questions or extra information?"></textarea>
          </div>
          
          <div data-netlify-recaptcha="true" class="mb-3"></div>
          
          <button type="submit" class="btn btn-primary" style="width: 100%;">Submit Application</button>
        </form>
        
      </div>
    </div>
  </section>

  <div id="site-footer"></div>


  <script src="js/includes.js"></script>

</body>
</html>
