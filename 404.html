<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>404 - Page Not Found | Computing Institute of Technology</title>
  <link rel="icon" type="image/png" href="Gallery/Logo.png">
  <link rel="stylesheet" href="css/style.css">
  <style>
    .error-container {
      min-height: 70vh;
      display: flex;
      flex-direction: column;
      align-items: center;
      justify-content: center;
      text-align: center;
      padding: 2rem;
    }
    .error-code {
      font-size: 8rem;
      font-weight: 800;
      color: var(--primary-color);
      line-height: 1;
      margin-bottom: 1rem;
      position: relative;
      animation: float 3s ease-in-out infinite;
    }
    .error-code::after {
      content: '404';
      position: absolute;
      top: 0;
      left: 0;
      color: var(--accent-color);
      opacity: 0.1;
      transform: translate(10px, 10px);
      z-index: -1;
    }
    .error-message {
      font-size: 2rem;
      margin-bottom: 1.5rem;
      color: var(--text-color);
    }
    .error-description {
      max-width: 500px;
      margin-bottom: 3rem;
      color: var(--text-muted);
      font-size: 1.1rem;
    }
    @keyframes float {
      0%, 100% { transform: translateY(0); }
      50% { transform: translateY(-20px); }
    }
  </style>
</head>
<body>

  <div id="site-header"></div>

  <section class="error-container animate-fade-up">
    <div class="error-code">404</div>
    <h1 class="error-message">Oops! Page Not Found</h1>
    <p class="error-description">
      It seems like the page you are looking for has been moved, renamed, or perhaps never existed in the first place. Don't worry, we'll help you find your way back.
    </p>
    <div style="display: flex; gap: 1rem; flex-wrap: wrap; justify-content: center;">
      <a href="index.html" class="btn btn-primary">Go Back Home</a>
      <a href="courses.html" class="btn btn-secondary">Explore Our Courses</a>
    </div>
  </section>

  <div id="site-footer"></div>

  <script src="js/includes.js"></script>
</body>
</html>
