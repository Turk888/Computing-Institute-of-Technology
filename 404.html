<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Page Not Found | Computing Institute of Technology</title>
  <link rel="icon" type="image/png" href="Gallery/Logo.png">
  <!-- Resource Hints & Preconnect -->
  <link rel="preconnect" href="https://fonts.googleapis.com">
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
  <link rel="dns-prefetch" href="https://fonts.googleapis.com">

  <!-- Preload Critical Assets -->
  <link rel="preload" href="css/style.css" as="style">
  <link rel="preload" href="Gallery/Logo.png" as="image" fetchpriority="high">
  <link rel="preload" href="includes/header.html" as="fetch" crossorigin>
  <link rel="preload" href="includes/footer.html" as="fetch" crossorigin>

  <link rel="stylesheet" href="css/style.css">

  <!-- Open Graph / Facebook -->
  <meta property="og:site_name" content="CIT Muzaffarabad">
  <meta property="og:type" content="website">
  <meta property="og:url" content="https://turk888.github.io/Computing-Institute-of-Technology/404.html">
  <meta property="og:title" content="Page Not Found | Computing Institute of Technology">
  <meta property="og:description" content="Oops! The page you were looking for could not be found. Go back home to explore our CIT courses and campus.">
  <meta property="og:image" content="https://turk888.github.io/Computing-Institute-of-Technology/Gallery/Logo.png">
  <meta property="og:image:width" content="512">
  <meta property="og:image:height" content="512">

  <!-- Twitter -->
  <meta name="twitter:card" content="summary_large_image">
  <meta name="twitter:title" content="Page Not Found | Computing Institute of Technology">
  <meta name="twitter:description" content="Oops! The page you were looking for could not be found. Go back home to explore our CIT courses and campus.">
  <meta name="twitter:image" content="https://turk888.github.io/Computing-Institute-of-Technology/Gallery/Logo.png">
  <style>
    .error-container {
      min-height: 70vh;
      display: flex;
      flex-direction: column;
      align-items: center;
      justify-content: center;
      text-align: center;
      padding: 2rem;
    }
    .error-code {
      font-size: 8rem;
      font-weight: 800;
      color: var(--primary-color);
      line-height: 1;
      margin-bottom: 1rem;
      position: relative;
      animation: float 3s ease-in-out infinite;
    }
    .error-code::after {
      content: '404';
      position: absolute;
      top: 0;
      left: 0;
      color: var(--accent-color);
      opacity: 0.1;
      transform: translate(10px, 10px);
      z-index: -1;
    }
    .error-message {
      font-size: 2rem;
      margin-bottom: 1.5rem;
      color: var(--text-color);
    }
    .error-description {
      max-width: 500px;
      margin-bottom: 3rem;
      color: var(--text-muted);
      font-size: 1.1rem;
    }
    @keyframes float {
      0%, 100% { transform: translateY(0); }
      50% { transform: translateY(-20px); }
    }
  </style>
</head>
<body>

  <div id="site-header"></div>

  <section class="error-container animate-fade-up">
    <div class="error-code">404</div>
    <h1 class="error-message">Oops! Page Not Found</h1>
    <p class="error-description">
      It seems like the page you are looking for has been moved, renamed, or perhaps never existed in the first place. Don't worry, we'll help you find your way back.
    </p>
    <div style="display: flex; gap: 1rem; flex-wrap: wrap; justify-content: center;">
      <a href="index.html" class="btn btn-primary">Go Back Home</a>
      <a href="courses.html" class="btn btn-secondary">Explore Our Courses</a>
    </div>
  </section>

  <div id="site-footer"></div>

  <script src="js/includes.js"></script>
</body>
</html>
